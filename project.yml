name: BoomerangChat
options:
  bundleIdPrefix: com.prototype
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

targets:
  BoomerangChat:
    type: application
    platform: iOS
    sources:
      - BoomerangChat
    settings:
      base:
        INFOPLIST_FILE: BoomerangChat/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.prototype.BoomerangChat
        SWIFT_VERSION: 5.9
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
